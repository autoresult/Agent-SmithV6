version: '3.8'

services:
  # SeaweedFS - Object Storage para PDFs, DOCXs, TXTs, JSONs
  # Substitui MinIO (que removeu admin e parou imagens oficiais em out/2025)
  # Modo: server -s3 inicia master + volume + filer + S3 API em um único processo
  # Admin UI (weed admin): http://localhost:23646
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: agent-smith-seaweedfs
    command: server -s3 -s3.port=8333 -filer -dir=/data
    ports:
      - "9333:9333"   # Master HTTP
      - "8080:8080"   # Volume HTTP
      - "8888:8888"   # Filer HTTP
      - "8333:8333"   # S3 API (equivalente ao 9000 do MinIO)
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9333/cluster/status || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 15s
    networks:
      - agent-smith-network

  # SeaweedFS Admin UI (weed admin) - porta 19333 é gRPC do master, NÃO é a UI
  # Admin UI real roda em porta separada via 'weed admin'
  seaweedfs-admin:
    image: chrislusf/seaweedfs:latest
    container_name: agent-smith-seaweedfs-admin
    command: admin -filer=seaweedfs:8888
    ports:
      - "23646:23646"   # Admin UI web
    depends_on:
      seaweedfs:
        condition: service_healthy
    networks:
      - agent-smith-network

  # Qdrant - Vector Database para embeddings  
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: agent-smith-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-smith-network

  # Redis - Message Buffer para WhatsApp
  redis:
    image: redis:8.6.1-alpine
    container_name: agent-smith-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-smith-network

volumes:
  seaweedfs_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  agent-smith-network:
    driver: bridge
