name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: '3.11'
  # Env vars mínimas para pydantic Settings
  SUPABASE_URL: http://test.supabase.co
  SUPABASE_KEY: test-supabase-key
  OPENAI_API_KEY: sk-test-key
  ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmNoYXJz
  ENV: test

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Unit Tests (sem Docker, rápido)
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    name: "🧱 Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        working-directory: backend
        run: |
          pytest tests/unit -m unit -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            --junitxml=junit-unit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage-unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: backend/junit-unit.xml

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Integration Tests (Testcontainers + Docker)
  # ═══════════════════════════════════════════════════════════════
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        working-directory: backend
        run: |
          pytest tests/integration -m integration -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            --junitxml=junit-integration.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: backend/coverage-integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: backend/junit-integration.xml

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Coverage Report (merge + threshold)
  # ═══════════════════════════════════════════════════════════════
  coverage-report:
    name: "📊 Coverage Report"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage/

      - name: Display coverage summary
        run: |
          echo "📊 Coverage artifacts downloaded"
          ls -la coverage/

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Lint (ruff)
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: "🔍 Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff>=0.14.0

      - name: Run ruff check
        working-directory: backend
        run: ruff check app/ tests/ --output-format=github

      - name: Run ruff format check
        working-directory: backend
        run: ruff format app/ tests/ --check
